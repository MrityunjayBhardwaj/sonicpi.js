<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sonic Pi Web</title>
  <meta name="description" content="Live coding music synth in your browser. Based on Sonic Pi by Sam Aaron.">
  <meta name="theme-color" content="#0d1117">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://esm.sh">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      overflow: hidden;
      background: #0d1117;
    }
    body {
      font-family: 'Fira Code', 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace;
      color: #CDD3DE;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    /* Selection */
    ::selection { background: rgba(232, 82, 124, 0.3); }
    /* Disable outline on focus for buttons */
    button:focus { outline: none; }
    button:focus-visible { outline: 2px solid #E8527C; outline-offset: 1px; }
    select:focus { outline: none; }
    select:focus-visible { outline: 2px solid #E8527C; outline-offset: 1px; }
    /* Loading state */
    #app {
      opacity: 0;
      animation: fadeIn 0.3s ease-out 0.1s forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/app/index.ts"></script>
</body>
</html>
