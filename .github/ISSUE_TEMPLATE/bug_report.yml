name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: SonicPi.js version
      description: Shown in the top-right of the app's menu bar. If reporting via the in-app "Report Bug" button, this is pre-filled.
      placeholder: "e.g., 1.5.0-beta.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: sonic-pi-code
    attributes:
      label: Sonic Pi code
      description: Paste the code that triggers the bug.
      render: ruby

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g., macOS 14, Windows 11, Ubuntu 24.04"

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "Annoyance — workaround exists"
        - "Significant — no workaround"
        - "Blocking — can't use the app"
    validations:
      required: true

  - type: checkboxes
    id: desktop-comparison
    attributes:
      label: Does this work in desktop Sonic Pi?
      options:
        - label: "Yes, the same code works correctly in desktop Sonic Pi"
        - label: "I haven't tested in desktop Sonic Pi"
